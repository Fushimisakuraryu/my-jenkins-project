server:
  port: 8080

spring:
  application:
    name: jenkins-demo
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

app:
  version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
